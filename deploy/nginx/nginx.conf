# ---------------------------------------------------------------------------
# TAMS edge reverse proxy (11 §7/§11). Terminates TLS, applies security headers,
# serves the SPA static bundle with history-mode fallback, and reverse-proxies
# /api to the load-balanced API instances. Serving SPA + API from one origin
# means no CORS is needed for the SPA in production (06 §13).
#
# Certs and the upstream API host are environment-specific and injected via the
# bind-mounts / DNS names in docker-compose.yml — no secrets live in this file.
# ---------------------------------------------------------------------------

# The API service name resolves to all API replicas via Docker's DNS round-robin
# (11 §7 — ≥2 stateless instances behind the proxy).
upstream tams_api {
    server api:8080;
}

# Redirect all plain HTTP to HTTPS (TLS enforced at the edge, 06 §13).
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # TLS material is mounted read-only from the host secret store (11 §5).
    ssl_certificate     /etc/nginx/certs/tams.crt;
    ssl_certificate_key /etc/nginx/certs/tams.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Security headers (06 §13). HSTS is set here at the TLS edge. ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # The SPA is HTML/JS/CSS from this origin only; connect-src self covers /api.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'" always;

    # Reasonable upload ceiling; exports stream out (11 perf hardening).
    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    # --- API reverse proxy ---
    location /api/ {
        proxy_pass         http://tams_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Exports can take longer than a default read timeout.
        proxy_read_timeout 120s;
    }

    # Health probes pass straight through (05 §10.9).
    location = /health/ready { proxy_pass http://tams_api; }
    location = /health/live  { proxy_pass http://tams_api; }

    # --- SPA history-mode fallback: unknown paths return index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted assets; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
